        // Configurazione Firebase
        const firebaseConfig = {
            apiKey: "AIzaSyBJjhL9-d-2QMKDYviV7KfYhUOHWDAoasU",
            authDomain: "horizongls.firebaseapp.com",
            databaseURL: "https://horizongls-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "horizongls",
            storageBucket: "horizongls.firebasestorage.app",
            messagingSenderId: "611544552805",
            appId: "1:611544552805:web:88fb0e35e59fb5bf543d8c",

    <style>
        /* --- BASE VARIABLES (GESTIONALE) --- */
        :root {
            --primary: #2563EB; --primary-dark: #1E40AF; --secondary: #0F172A;
            --accent: #22C55E; --warning: #F59E0B; --danger: #EF4444;
            --bg: #F8FAFC; --card: #FFFFFF; --text: #0F172A; --text-light: #64748B;
            --border: #E2E8F0; --sidebar-w: 260px; --shadow: 0 4px 6px -1px rgba(0,0,0,0.05);
            --sys-font: 'Inter', sans-serif;
        }

        /* --- DARK VARIABLES (HARDWARE MONITOR GRADO MAF) --- */
        body.hw-mode {
            --bg: #03060a; --card: rgba(10, 15, 25, 0.85); --text: #b8f2ff; --text-light: #4a758c;
            --border: rgba(0, 229, 255, 0.2); --primary: #00e5ff; --secondary: #0a1018;
            --sys-font: 'Rajdhani', sans-serif;
            background: radial-gradient(circle at top right, #09121f, var(--bg));
        }
        body.hw-mode .sidebar { background: #020406; border-right-color: var(--border); }
        body.hw-mode .topbar { background: #020406; border-bottom-color: var(--border); }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: var(--sys-font); transition: background 0.3s, color 0.3s; }
        body { background: var(--bg); color: var(--text); display: flex; height: 100vh; overflow: hidden; }

        /* --- LOGIN SCREEN --- */
        #login-overlay { position: fixed; inset: 0; background: #0F172A; z-index: 9999; display: flex; align-items: center; justify-content: center; }
        .login-box { background: white; padding: 40px; border-radius: 16px; width: 400px; text-align: center; box-shadow: 0 20px 25px -5px rgba(0,0,0,0.1); }
        .login-tabs { display: flex; margin-bottom: 20px; border-radius: 8px; overflow: hidden; border: 1px solid var(--border); }
        .login-tabs button { flex: 1; padding: 10px; border: none; font-weight: bold; cursor: pointer; background: #f1f5f9; color: #64748B; transition: all 0.2s; }
        .login-tabs button.active { background: var(--primary); color: white; }
        .login-box input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ccc; border-radius: 8px; outline: none; }
        .btn-login { width: 100%; padding: 12px; background: var(--primary); color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; margin-top: 10px; }

        /* --- LAYOUT --- */
        .sidebar { width: var(--sidebar-w); background: var(--card); border-right: 1px solid var(--border); display: flex; flex-direction: column; z-index: 10; overflow-y: auto;}
        .logo { height: 70px; display: flex; align-items: center; padding: 0 24px; gap: 12px; border-bottom: 1px solid var(--border); flex-shrink: 0;}
        .logo i { font-size: 24px; color: var(--primary); }
        .nav { flex: 1; padding: 20px 12px; display: flex; flex-direction: column; gap: 4px; }
        .nav-link { display: flex; align-items: center; justify-content: space-between; padding: 10px 16px; border-radius: 8px; color: var(--text-light); text-decoration: none; font-weight: 500; cursor: pointer; font-size: 14px;}
        .nav-link:hover { background: rgba(37, 99, 235, 0.1); color: var(--primary); }
        .nav-link.active { background: var(--primary); color: white; }

        .main { flex: 1; display: flex; flex-direction: column; overflow: hidden; position: relative;}
        .topbar { height: 70px; background: var(--card); border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; padding: 0 32px; z-index:10; flex-shrink: 0;}
        .view { display: none; padding: 32px; overflow-y: auto; height: calc(100vh - 70px); animation: fadeIn 0.3s ease; }
        .view.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* --- GESTIONALE UI --- */
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 24px; margin-bottom: 24px; }
        .card { background: var(--card); border-radius: 16px; border: 1px solid var(--border); padding: 24px; box-shadow: var(--shadow); }
        .card-title { font-size: 13px; font-weight: 600; color: var(--text-light); text-transform: uppercase; margin-bottom: 12px; }
        .card-value { font-size: 26px; font-weight: 700; color: var(--text); }
        
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th { text-align: left; padding: 12px 16px; color: var(--text-light); font-size: 11px; text-transform: uppercase; border-bottom: 1px solid var(--border); }
        td { padding: 14px 16px; border-bottom: 1px solid var(--border); font-size: 14px; color: var(--text);}
        .action-btns button { padding: 4px 8px; border:none; border-radius: 4px; cursor:pointer; margin-right:5px; font-size: 12px;}
        .btn-edit { background: var(--warning); color: #fff;}
        .btn-del { background: var(--danger); color: #fff;}
        .btn-validate { background: var(--accent); color: #fff; }

        .btn { padding: 10px 20px; border-radius: 8px; border: none; font-weight: 600; cursor: pointer; background: var(--primary); color: white; display: inline-flex; align-items: center; gap: 8px;}
        .input { width: 100%; padding: 10px; margin: 5px 0 15px; border-radius: 8px; border: 1px solid var(--border); background: var(--bg); color: var(--text); outline: none; }
        .badge { padding: 4px 8px; border-radius: 12px; font-size: 11px; font-weight: bold; }

        /* --- MODAL --- */
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6); backdrop-filter: blur(4px); z-index: 100; align-items: center; justify-content: center; }
        .modal.active { display: flex; }
        .modal-content { background: var(--card); width: 600px; max-height: 90vh; overflow-y: auto; border-radius: 16px; padding: 30px; border: 1px solid var(--border); color: var(--text); }

        /* --- GEMINI AI CHAT --- */
        .ai-chat { display: flex; flex-direction: column; height: 500px; border: 1px solid var(--border); border-radius: 12px; background: var(--bg); }
        .ai-msgs { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 15px; }
        .msg { max-width: 80%; padding: 12px 16px; border-radius: 12px; font-size: 14px; line-height: 1.5; }
        .msg.bot { background: white; border: 1px solid var(--border); align-self: flex-start; }
        .msg.user { background: var(--primary); color: white; align-self: flex-end; }
        .ai-input { display: flex; padding: 15px; border-top: 1px solid var(--border); background: var(--card); }
        .ai-input input { flex: 1; border: 1px solid var(--border); border-radius: 8px; padding: 10px; margin-right: 10px; outline: none; }

        /* --- GRADO MAF & EOLO FFK9 SPECIFIC --- */
        .hw-panel { border: 1px solid var(--primary); padding: 15px; background: rgba(0,0,0,0.4); border-radius: 4px; box-shadow: inset 0 0 20px rgba(0,229,255,0.05); }
        .hw-title { color: var(--primary); font-size: 14px; text-transform: uppercase; border-bottom: 1px solid rgba(0,229,255,0.3); padding-bottom: 5px; margin-bottom: 10px; letter-spacing: 1px; }
        .terminal { background: #010204; color: #00ff66; font-family: monospace; padding: 10px; height: 150px; overflow-y: auto; border: 1px solid #1a2b3c; font-size: 12px; }
    </style>
</head>

    <script>
        // --- UI LOGIN MODE SWITCHER ---
        let userRoleMode = 'admin';
        function switchLoginMode(mode) {
            userRoleMode = mode;
            const btnAdmin = document.getElementById('btn-tab-admin');
            const btnStaff = document.getElementById('btn-tab-staff');
            const desc = document.getElementById('login-desc');
            const btnAction = document.getElementById('btn-login-action');

            if(mode === 'admin') {
                btnAdmin.classList.add('active');
                btnStaff.classList.remove('active');
                desc.innerText = 'Accesso Riservato Direzione (direzione@horizonglobal.com)';
                btnAction.innerText = 'Effettua Login Admin';
                btnAction.setAttribute('onclick', "attemptLogin('admin')");
            } else {
                btnStaff.classList.add('active');
                btnAdmin.classList.remove('active');
                desc.innerText = 'Accesso Operativo Staff';
                btnAction.innerText = 'Effettua Login Staff';
                btnAction.setAttribute('onclick', "attemptLogin('staff')");
            }
        }

        // --- 1. CORE RELATIONAL STATE ---
        let state = {
            companies: [
                { id: 1, name: 'Global Horizon', cap: 5000000, projects: 12, eff: 95, isActive: true },
                { id: 2, name: 'Ryzn Music GROUP', cap: 150000, projects: 3, eff: 88, isActive: true },
                { id: 3, name: 'Esc', cap: 2400000, projects: 5, eff: 92, isActive: true },
                { id: 4, name: 'Dev.ryzn', cap: 500000, projects: 8, eff: 97, isActive: true }
            ],
            divisions: [
                { id: 1, companyId: 2, name: 'Publishing', budget: 50000, eff: 90 },
                { id: 2, companyId: 3, name: 'Space Research', budget: 1500000, eff: 98 },
                { id: 3, companyId: 4, name: 'Core Dev', budget: 300000, eff: 96 }
            ],
            staff: [
                { id: 1, name: 'Luis Brotto', role: 'Operatore', companyId: 1, divisionId: 1, status: 'IN SEDE' },
                { id: 2, name: 'Sara Kreutz', role: 'Astro Physicist', companyId: 3, divisionId: 2, status: 'FUORI SEDE' }
            ],
            time_entries: [
                { id: 101, staffId: 1, timestamp: new Date(Date.now() - 4000000).toISOString(), type: 'Ingresso', geo: '41.9,12.5', device: 'iOS App v2.1', validated: true, forced: false },
                { id: 102, staffId: 2, timestamp: new Date(Date.now() - 8000000).toISOString(), type: 'Ingresso', geo: 'Non tracciato', device: 'Web Portal', validated: false, forced: true }
            ],
            documents: [
                { id: 1, date: '2023-10-05', title: 'Fattura Server AWS', companyId: 4, amount: 450.00, type: 'uscita', file: '' },
                { id: 2, date: '2023-10-06', title: 'Licenze Software Global', companyId: 1, amount: 25000.00, type: 'entrata', file: 'ricevuta.pdf' }
            ],
            tasks: [
                { id: 1, title: 'Integrazione API Bancarie', staffId: 1, priority: 'Alta', status: 'In Lavorazione' },
                { id: 2, title: 'Revisione Contratti Staff', staffId: 2, priority: 'Media', status: 'Da Iniziare' }
            ]
        };

        // --- 1.5 FIREBASE AUTO-SYNC ---
        async function syncConFirebase() {
            if (!window.db || !window.fs) return;
            
            try {
                const compRef = window.fs.collection(window.db, 'companies');
                const compSnapshot = await window.fs.getDocs(compRef);
                
                if (compSnapshot.empty) {
                    const uploadCollection = async (collectionName, dataArray) => {
                        for (let item of dataArray) {
                            const docRef = window.fs.doc(window.db, collectionName, item.id.toString());
                            await window.fs.setDoc(docRef, item);
                        }
                    };

                    await Promise.all([
                        uploadCollection('companies', state.companies),
                        uploadCollection('divisions', state.divisions),
                        uploadCollection('staff', state.staff),
                        uploadCollection('time_entries', state.time_entries),
                        uploadCollection('documents', state.documents),
                        uploadCollection('tasks', state.tasks)
                    ]);
                } else {
                    const fetchCollection = async (collectionName) => {
                        const snap = await window.fs.getDocs(window.fs.collection(window.db, collectionName));
                        let arr = [];
                        snap.forEach(doc => arr.push(doc.data()));
                        return arr;
                    };

                    state.companies = await fetchCollection('companies');
                    state.divisions = await fetchCollection('divisions');
                    state.staff = await fetchCollection('staff');
                    state.time_entries = await fetchCollection('time_entries');
                    state.documents = await fetchCollection('documents');
                    state.tasks = await fetchCollection('tasks');
                }
                
                if(document.getElementById('login-overlay').style.display === 'none') {
                    renderAll();
                }
            } catch (error) {
                console.error("Errore durante il sync con Firebase:", error);
            }
        }

        setTimeout(syncConFirebase, 1500);

        const getCompanyName = (id) => { const c = state.companies.find(x => x.id == id); return c ? c.name : 'N/A'; };
        const getDivName = (id) => { const d = state.divisions.find(x => x.id == id); return d ? d.name : 'N/A'; };
        const getStaffName = (id) => { const s = state.staff.find(x => x.id == id); return s ? s.name : 'Sconosciuto'; };

        // --- 2. AUTHENTICATION & ROLES ---
        async function attemptLogin(roleAttempt) {
            const u = document.getElementById('login-user').value;
            const p = document.getElementById('login-pass').value;
            try {
                const result = await window.signInWithEmailAndPassword(window.auth, u, p);
                const userEmail = result.user.email.toLowerCase();

                if (roleAttempt === 'admin' && userEmail !== 'direzione@horizonglobal.com') {
                    alert("Accesso negato: account non autorizzato per la Direzione. Utilizza il modulo Staff.");
                    if(window.signOut) await window.signOut(window.auth);
                    return;
                }

                applyUserRole(userEmail);

                document.getElementById('login-overlay').style.display = 'none';
                renderAll();
            } catch (error) {
                alert("Credenziali errate o utente non trovato in Firebase.");
                console.error("Auth Error:", error);
            }
        }

        function applyUserRole(userEmail) {
            window.currentUserEmail = userEmail;
            
            if (userEmail === 'direzione@horizonglobal.com') {
                window.userRole = 'admin';
                document.getElementById('current-user-name').innerText = "Direzione Generale";
                document.getElementById('current-user-role').innerText = "Root Admin";
                document.getElementById('current-user-avatar').innerText = "DG";
                document.querySelectorAll('.admin-only').forEach(el => el.style.display = '');
            } else {
                window.userRole = 'staff';
                document.getElementById('current-user-name').innerText = userEmail;
                document.getElementById('current-user-role').innerText = "Staff Operativo";
                document.getElementById('current-user-avatar').innerText = userEmail.substring(0, 2).toUpperCase();
                
                // Nascondi elementi di creazione/impostazioni per lo staff
                document.querySelectorAll('.admin-only').forEach(el => el.style.display = 'none');
            }
        }

        async function createNewUserAuth() {
            const email = prompt("Inserisci l'email aziendale per il nuovo dipendente:");
            const password = prompt("Inserisci una password temporanea (min. 6 caratteri):");
            
            if (email && password) {
                try {
                    await window.createUserWithEmailAndPassword(window.auth, email, password);
                    alert("Account dipendente creato con successo!\n\nATTENZIONE: Firebase, per sicurezza, ti ha loggato col nuovo account appena creato. Ricarica la pagina e accedi nuovamente come Direzione.");
                } catch (error) {
                    alert("Errore durante la creazione dell'account: " + error.message);
                }
            }
        }

        // --- 3. NAVIGATION ---
        function nav(id, element) {
            document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
            document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
            
            document.getElementById('view-'+id).classList.add('active');
            if(element) element.classList.add('active');
            
            if(element) document.getElementById('page-title').innerText = element.innerText;
            
            if(id === 'macchina' || id === 'eolo') {
                document.body.classList.add('hw-mode');
                if(id==='macchina') initHardwareCharts();
            } else {
                document.body.classList.remove('hw-mode');
            }
        }

        function openModal(id) { 
            document.getElementById(id).classList.add('active'); 
            populateSelects(); 
        }
        function closeModal(id) { 
            document.getElementById(id).classList.remove('active'); 
            document.querySelectorAll(`#${id} input[type="hidden"]`).forEach(i => i.value = '');
        }

        function populateSelects() {
            const companyOpts = state.companies.map(c => `<option value="${c.id}">${c.name}</option>`).join('');
            if(document.getElementById('doc-company')) document.getElementById('doc-company').innerHTML = companyOpts;
            if(document.getElementById('staff-company')) document.getElementById('staff-company').innerHTML = companyOpts;
            if(document.getElementById('div-company')) document.getElementById('div-company').innerHTML = companyOpts;
            
            const staffOpts = state.staff.map(s => `<option value="${s.id}">${s.name} (${getCompanyName(s.companyId)})</option>`).join('');
            if(document.getElementById('timb-staff')) document.getElementById('timb-staff').innerHTML = staffOpts;
            if(document.getElementById('task-staff')) document.getElementById('task-staff').innerHTML = staffOpts;
            
            populateDivisionsForStaff();
        }

        function populateDivisionsForStaff() {
            const compId = document.getElementById('staff-company')?.value;
            if(!compId) return;
            const divs = state.divisions.filter(d => d.companyId == compId);
            const el = document.getElementById('staff-div');
            if(el) el.innerHTML = divs.map(d => `<option value="${d.id}">${d.name}</option>`).join('') || '<option value="">Nessuna divisione</option>';
        }

        // --- 4. RENDER ENGINE ---
        function renderAll() {
            const isAdmin = window.userRole === 'admin';
            let totalCap = state.companies.reduce((s, c) => s + c.cap, 0);

            document.getElementById('dash-summary').innerHTML = `
                <div class="card"><div class="card-title">Capitale Consolidato Gruppo</div><div class="card-value">€ ${(totalCap/1000000).toFixed(2)} M</div></div>
                <div class="card"><div class="card-title">Entità Corporate Attive</div><div class="card-value">${state.companies.length}</div></div>
                <div class="card"><div class="card-title">Staff Globale Operativo</div><div class="card-value">${state.staff.length}</div></div>
            `;
            document.getElementById('table-dash-stats').querySelector('tbody').innerHTML = state.companies.map(c => `
                <tr><td><b>${c.name}</b></td><td>€ ${c.cap.toLocaleString()}</td><td>${c.projects}</td><td><span style="color:${c.eff>90?'var(--accent)':'var(--warning)'}">${c.eff}%</span></td></tr>
            `).join('');

            document.getElementById('table-aziende').querySelector('tbody').innerHTML = state.companies.map(c => `
                <tr>
                    <td><b>${c.name}</b></td><td>€ ${c.cap.toLocaleString()}</td><td>${c.projects}</td><td>${c.eff}%</td>
                    <td><span class="badge" style="background:var(--accent); color:white;">Attiva</span></td>
                    <td class="action-btns">${isAdmin ? `<button class="btn-edit" onclick="editAzienda(${c.id})">Modifica Dati</button> <button class="btn-del" onclick="deleteData('companies', ${c.id})">Elimina</button>` : '-'}</td>
                </tr>
            `).join('');

            document.getElementById('table-divs').querySelector('tbody').innerHTML = state.divisions.map(d => `
                <tr>
                    <td><b>${d.name}</b></td><td>${getCompanyName(d.companyId)}</td><td>€ ${d.budget.toLocaleString()}</td><td>${d.eff}%</td>
                    <td class="action-btns">${isAdmin ? `<button class="btn-del" onclick="deleteData('divisions', ${d.id})">Del</button>` : '-'}</td>
                </tr>
            `).join('');

            document.getElementById('table-tasks').querySelector('tbody').innerHTML = state.tasks.map(t => {
                let badgeCol = t.status === 'Completato' ? 'var(--accent)' : (t.status === 'In Lavorazione' ? 'var(--primary)' : 'var(--warning)');
                
                // Matching logic per lo Staff: la prima parte dell'email deve coincidere col nome dipendente
                let staffName = getStaffName(t.staffId);
                let normalizedStaffName = staffName.toLowerCase().replace(/[^a-z0-9]/g, '');
                let userPrefix = window.currentUserEmail ? window.currentUserEmail.split('@')[0].toLowerCase().replace(/[^a-z0-9]/g, '') : '';
                let isMyTask = (normalizedStaffName === userPrefix);

                let actionHtml = '-';
                if (isAdmin) {
                    actionHtml = `<button class="btn-edit" onclick="editTask(${t.id})">Modifica</button> <button class="btn-del" onclick="deleteData('tasks', ${t.id})">Del</button>`;
                } else if (isMyTask && t.status !== 'Completato') {
                    actionHtml = `<button class="btn-validate" onclick="completeTask(${t.id})">Segna Completato</button>`;
                }

                return `<tr>
                    <td><b>${t.title}</b></td><td>${getStaffName(t.staffId)}</td><td>${t.priority}</td>
                    <td><span class="badge" style="background:${badgeCol}; color:white;">${t.status}</span></td>
                    <td class="action-btns">${actionHtml}</td>
                </tr>`;
            }).join('');

            document.getElementById('table-timbrature').querySelector('tbody').innerHTML = state.time_entries.sort((a,b)=>new Date(b.timestamp)-new Date(a.timestamp)).map(t => {
                const badgeColor = t.type === 'Ingresso' ? 'var(--accent)' : 'var(--warning)';
                const isVal = t.validated ? `<i class="ph-fill ph-check-circle" style="color:var(--accent)"></i> OK` : (isAdmin ? `<button class="btn-validate" onclick="validateTimbratura(${t.id})">Valida</button>` : 'In Attesa');
                return `<tr>
                    <td>${new Date(t.timestamp).toLocaleString()}</td>
                    <td><b>${getStaffName(t.staffId)}</b></td>
                    <td>${getCompanyName(state.staff.find(x=>x.id==t.staffId)?.companyId)}</td>
                    <td><span class="badge" style="background:${badgeColor}; color:white;">${t.type}</span> ${t.forced ? '⚠️' : ''}</td>
                    <td><span style="font-size:11px; color:var(--text-light)">${t.device} | Geo: ${t.geo}</span></td>
                    <td>${isVal}</td>
                    <td class="action-btns">${isAdmin ? `<button class="btn-del" onclick="deleteData('time_entries', ${t.id})">Del</button>` : '-'}</td>
                </tr>`;
            }).join('');

            let totalIn = state.documents.filter(d => d.type === 'entrata').reduce((s, d) => s + d.amount, 0);
            let totalOut = state.documents.filter(d => d.type === 'uscita').reduce((s, d) => s + d.amount, 0);
            document.getElementById('finance-summary').innerHTML = `
                <div class="card"><div class="card-title">Incassi (Attivo)</div><div class="card-value" style="color:var(--accent)">€ ${totalIn.toLocaleString()}</div></div>
                <div class="card"><div class="card-title">Uscite (Passivo)</div><div class="card-value" style="color:var(--danger)">€ ${totalOut.toLocaleString()}</div></div>
            `;
            
            document.getElementById('table-docs').querySelector('tbody').innerHTML = state.documents.map(d => `
                <tr>
                    <td>${d.date}</td><td>${d.title}</td><td>${getCompanyName(d.companyId)}</td><td>€ ${d.amount}</td>
                    <td><span style="color:${d.type==='entrata'?'var(--accent)':'var(--danger)'}">${d.type.toUpperCase()}</span></td>
                    <td>${d.file ? `<a href="#" style="color:var(--primary)">📎 Link Storage</a>` : '-'}</td>
                    <td class="action-btns">${isAdmin ? `<button class="btn-del" onclick="deleteData('documents', ${d.id})">Del</button>` : '-'}</td>
                </tr>
            `).join('');

            document.getElementById('table-staff').querySelector('tbody').innerHTML = state.staff.map(s => `
                <tr>
                    <td><b>${s.name}</b></td><td>${s.role}</td><td>${getCompanyName(s.companyId)}</td><td>${getDivName(s.divisionId)}</td>
                    <td><span class="badge" style="background:var(--primary); color:white;">${s.status}</span></td>
                    <td class="action-btns">${isAdmin ? `<button class="btn-del" onclick="deleteData('staff', ${s.id})">Del</button>` : '-'}</td>
                </tr>
            `).join('');
        }

        // --- 5. CRUD OPERATIONS CON SYNC FIREBASE ---
        async function saveToFirebase(collectionName, item) {
            if(window.fs && window.db) {
                try {
                    const docRef = window.fs.doc(window.db, collectionName, item.id.toString());
                    await window.fs.setDoc(docRef, item);
                } catch(e) { console.error("Sync Error", e); }
            }
        }

        async function removeFromFirebase(collectionName, id) {
            if(window.fs && window.db) {
                try {
                    const docRef = window.fs.doc(window.db, collectionName, id.toString());
                    await window.fs.deleteDoc(docRef);
                } catch(e) { console.error("Sync Error", e); }
            }
        }

        function deleteData(collection, id) {
            if(confirm(`Eliminare permanentemente questo record?`)) {
                state[collection] = state[collection].filter(x => x.id !== id);
                removeFromFirebase(collection, id);
                renderAll();
            }
        }

        function editAzienda(id) {
            const az = state.companies.find(x => x.id == id);
            openModal('modal-azienda');
            document.getElementById('azienda-modal-title').innerText = "Modifica Azienda";
            document.getElementById('azienda-id').value = az.id;
            document.getElementById('azienda-name').value = az.name;
            document.getElementById('azienda-cap').value = az.cap;
            document.getElementById('azienda-proj').value = az.projects;
            document.getElementById('azienda-eff').value = az.eff;
        }

        function saveAzienda() {
            const id = document.getElementById('azienda-id').value;

        // --- 6. API GEMINI E INTEGRAZIONE HARDWARE ---
        async function sendAiPrompt() {
            const input = document.getElementById('ai-text');
            const chat = document.getElementById('chat-box');
            const prompt = input.value.trim();
            if(!prompt) return;

            chat.innerHTML += `<div class="msg user"><b>Tu:</b> ${prompt}</div>`;
            input.value = '';
            chat.scrollTop = chat.scrollHeight;

            const typingId = 'typing-' + Date.now();
            chat.innerHTML += `<div id="${typingId}" class="msg bot"><b>Gemini AI:</b> Sto elaborando la richiesta...</div>`;
            chat.scrollTop = chat.scrollHeight;

            try {
                const apiKey = "AIzaSyDyTyNFd9BwTcIILHQI0kHGubMkGrBOTWg";
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${apiKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: prompt }] }]
                    })
                });
                
                const data = await response.json();
                let aiResponse = "Errore nella risposta.";
                if(data && data.candidates && data.candidates.length > 0) {
                    aiResponse = data.candidates[0].content.parts[0].text;
                }

                document.getElementById(typingId).outerHTML = `<div class="msg bot"><b>Gemini AI:</b> ${aiResponse.replace(/\n/g, '<br>')}</div>`;
                chat.scrollTop = chat.scrollHeight;

            } catch(error) {
                console.error("Gemini API Error:", error);
                document.getElementById(typingId).outerHTML = `<div class="msg bot" style="color: var(--danger);"><b>Sistema:</b> Errore di connessione all'API Gemini. Controlla la console per i dettagli.</div>`;
            }
        }

            term.scrollTop = term.scrollHeight;
        }
